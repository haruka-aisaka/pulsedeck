<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0d1220">
    <link rel="manifest" href="/manifest.json">
    <!-- ホーム画面追加時 (PWA) はステータスバーを半透明にしてコンテンツを裏まで表示する -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PulseDeck">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>PulseDeck</title>
    <link rel="stylesheet" href="/style.css">
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230d1220'/%3E%3Cpath d='M5 20 L11 20 L14 10 L18 24 L21 16 L27 16' stroke='%2358f6c4' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    >
  </head>
  <body>
    <header>
      <div class="brand">
        <svg viewBox="0 0 32 32" width="28" height="28">
          <rect width="32" height="32" rx="8" fill="#0d1220" />
          <path
            d="M5 20 L11 20 L14 10 L18 24 L21 16 L27 16"
            stroke="#58f6c4"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <h1>PulseDeck</h1>
      </div>
      <div class="hostinfo">
        <span id="hostname">—</span>
        <span class="sep">·</span>
        <span id="os">—</span>
        <span class="sep">·</span>
        <span>up <b id="uptime">—</b></span>
        <span class="sep">·</span>
        <span>load <b id="load">—</b></span>
      </div>
      <div class="conn" id="conn">
        <span class="dot"></span>
        <span id="conn-label">connecting</span>
      </div>
    </header>

    <main>
      <section class="gauges">
        <div class="card gauge" id="g-cpu">
          <div class="ring"><span class="val">—</span></div>
          <div class="glabel">CPU</div>
          <div class="gsub" id="g-cpu-sub"></div>
        </div>
        <div class="card gauge" id="g-mem">
          <div class="ring"><span class="val">—</span></div>
          <div class="glabel">Memory</div>
          <div class="gsub" id="g-mem-sub"></div>
        </div>
        <div class="card gauge" id="g-temp">
          <div class="ring"><span class="val">—</span></div>
          <div class="glabel">Temp</div>
          <div class="gsub" id="g-temp-sub"></div>
        </div>
        <div class="card gauge" id="g-disk">
          <div class="ring"><span class="val">—</span></div>
          <div class="glabel">Disk</div>
          <div class="gsub" id="g-disk-sub"></div>
        </div>
      </section>

      <div class="range-toggle" role="group" aria-label="Chart range">
        <button data-range="m1">1 min</button>
        <button data-range="m10" class="on">10 min</button>
        <button data-range="h3">3 h</button>
        <button data-range="h24">24 h</button>
      </div>

      <section class="charts">
        <div class="card chart">
          <h2>CPU <span class="unit">%</span></h2>
          <canvas id="c-cpu"></canvas>
        </div>
        <div class="card chart">
          <h2>Memory <span class="unit">%</span></h2>
          <canvas id="c-mem"></canvas>
        </div>
        <div class="card chart">
          <h2>Temperature <span class="unit">°C</span></h2>
          <canvas id="c-temp"></canvas>
        </div>
        <div class="card chart">
          <h2>
            Network <span class="unit">MB/s</span>
            <span class="legend"><i class="rx"></i>rx <i class="tx"></i>tx</span>
          </h2>
          <canvas id="c-net"></canvas>
        </div>
      </section>

      <section class="card services-card">
        <h2>Services <span id="svc-count" class="count"></span></h2>
        <div id="services" class="services"></div>
      </section>

      <section class="tables">
        <div class="card">
          <h2>CPU Cores</h2>
          <div id="cores" class="cores"></div>
        </div>
        <div class="card">
          <h2>Containers <span id="ct-count" class="count"></span></h2>
          <div class="scroll">
            <table id="containers">
              <thead>
                <tr>
                  <th>Name</th>
                  <th class="col-img">Image</th>
                  <th>State</th>
                  <th class="r">CPU%</th>
                  <th class="r">Mem</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <h2>Top Processes</h2>
          <div class="scroll">
            <table id="procs">
              <thead>
                <tr>
                  <th>PID</th>
                  <th>Name</th>
                  <th class="r">CPU%</th>
                  <th class="r">RSS</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <footer>PulseDeck — open-source server dashboard</footer>
    <script src="/app.js"></script>
  </body>
</html>
