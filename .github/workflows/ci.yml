# push / PR ごとにフォーマット・lint・型チェックと Docker ビルドを検証する
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          # Dockerfile のベースイメージと同じバージョンに固定（fmt の挙動差を防ぐ）
          deno-version: "2.3.6"
      - name: Format check
        run: deno fmt --check
      - name: Lint
        run: deno lint
      - name: Type check
        run: deno check server/main.ts

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t pulsedeck:ci .
